##################################################
# Prod Environment Configuration
##################################################

### application ###
spring.application.name=note

### Devtools ###
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

### Static Resources ###
spring.web.resources.static-locations=classpath:/static/

### Thymeleaf ###
spring.thymeleaf.prefix=classpath:/templates/

### Database Configuration ###
spring.datasource.url=jdbc:mariadb://${DB_HOST}/note?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=UTC
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.jpa.open-in-view=false
spring.sql.init.mode=never
spring.datasource.hikari.maximum-pool-size=10

### Flyway Configuration ###
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration/prod

### session ###
server.servlet.session.timeout=12h

### multipart ###
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
server.tomcat.max-swallow-size=50MB