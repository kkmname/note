<!doctype html>
<html lang="ko">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>kkmnote</title>
    <meta name="description" content="kkmnote — note archive" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon/android-chrome-512x512.png">
    <link rel="shortcut icon" href="/favicon/favicon.ico">
    <link rel="manifest" href="/favicon/site.webmanifest">
    <meta name="description" content="kkmnote — 개인 노트 저장소" />

    <!-- EasyMDE -->
    <link rel="stylesheet" href="https://unpkg.com/easymde/dist/easymde.min.css" />
    <script src="https://unpkg.com/easymde/dist/easymde.min.js"></script>

    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="/css/home.css" />
</head>

<body>

    <div class="layout">

        <!-- ════════════════════════════════
            SIDEBAR (left — tree view)
        ════════════════════════════════ -->
        <aside class="sidebar" id="sidebar">

            <!-- Sidebar Header -->
            <div class="sidebar-header">
                <div class="brand">
                    <div class="logo" aria-hidden="true"></div>
                    <div>
                        <h1>kkmnote</h1>
                        <p>personal notes</p>
                    </div>
                </div>

                <div class="sidebar-actions">
                    <!-- Theme -->
                    <button class="btn" id="themeBtn" type="button" title="테마 전환">
                        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                            <path d="M21 12.7A8.5 8.5 0 1 1 11.3 3a7 7 0 0 0 9.7 9.7Z" stroke="currentColor"
                                stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                    </button>
                    <!-- New Folder -->
                    <button class="btn" id="newFolderBtn" type="button" title="새 폴더">
                        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                            <path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7Z"
                                stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" />
                            <path d="M12 11v4M10 13h4" stroke="currentColor" stroke-width="1.6"
                                stroke-linecap="round" />
                        </svg>
                    </button>
                    <!-- New Note -->
                    <button class="btn btn-primary" id="newNoteBtn" type="button" title="새 노트">
                        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                            <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="1.8"
                                stroke-linecap="round" />
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Tree Body -->
            <div class="sidebar-body" id="sidebarBody">
                <ul class="tree" id="tree" role="tree" aria-label="노트 트리"></ul>
            </div>

            <!-- Sidebar Footer -->
            <div class="sidebar-footer">
                <span id="noteCount">—</span>
                <button class="btn" id="logoutBtn" type="button" style="padding:4px 9px;font-size:11px;">
                    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true" style="width:12px;height:12px;">
                        <path d="M17 16l4-4-4-4M21 12H9" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"
                            stroke-linejoin="round" />
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" stroke="currentColor" stroke-width="1.7"
                            stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                    로그아웃
                </button>
            </div>

        </aside>

        <!-- ════════════════════════════════
            EDITOR PANEL (right)
        ════════════════════════════════ -->
        <section class="editor-panel" id="editorPanel" aria-label="노트 에디터">

            <!-- Editor Topbar -->
            <div class="editor-topbar" id="editorTopbar">
                <!-- Mobile back button (visible only on mobile) -->
                <button class="btn mob-back-btn" id="mobileBackBtn" type="button" title="목록으로" aria-label="노트 목록으로">
                    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M19 12H5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
                        <path d="M10 7l-5 5 5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                </button>

                <span class="editor-title placeholder" id="editorTitle">노트를 선택하세요</span>

                <div class="editor-topbar-actions" id="editorActions" style="display:none;">
                    <!-- Edit / Preview toggle -->
                    <button class="btn" id="editModeBtn" type="button" title="편집 모드 전환">
                        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                            <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" stroke="currentColor"
                                stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                        <span id="editModeBtnText">편집</span>
                    </button>
                    <!-- Save -->
                    <button class="btn btn-primary" id="saveBtn" type="button" title="저장 (Ctrl+S)">
                        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"
                                stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" />
                            <path d="M17 21v-8H7v8M7 3v5h8" stroke="currentColor" stroke-width="1.6"
                                stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                        저장
                    </button>
                </div>
            </div>

            <!-- Editor Body -->
            <div class="editor-body" id="editorBody">

                <!-- Empty state -->
                <div class="editor-empty" id="editorEmpty">
                    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6Z" stroke="currentColor"
                            stroke-width="1.3" stroke-linejoin="round" />
                        <path d="M14 2v6h6M16 13H8M16 17H8M10 9H8" stroke="currentColor" stroke-width="1.3"
                            stroke-linecap="round" />
                    </svg>
                    <p>좌측에서 노트를 선택하거나<br>새 노트를 만드세요</p>
                    <small>우클릭으로 폴더/노트 관리 가능</small>
                </div>

                <!-- EasyMDE mount target -->
                <textarea id="mdeTarget" style="display:none;"></textarea>

            </div>

        </section>

    </div><!-- .layout -->

    <!-- Toast -->
    <div class="toast" id="toast" role="status" aria-live="polite">
        <span class="t-dot" aria-hidden="true"></span>
        <span id="toastText"></span>
    </div>

    <!-- Context Menu -->
    <div class="ctx-menu" id="ctxMenu" role="menu" aria-label="컨텍스트 메뉴">
        <div class="ctx-item" id="ctxNewNote" role="menuitem" style="display:none;">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
            </svg>
            새 노트
        </div>
        <div class="ctx-item" id="ctxNewFolder" role="menuitem" style="display:none;">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7Z"
                    stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" />
            </svg>
            새 폴더
        </div>
        <div class="ctx-item" id="ctxRename" role="menuitem" style="display:none;">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" stroke="currentColor"
                    stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" stroke="currentColor"
                    stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
            이름 변경
        </div>
        <div class="ctx-separator ctx-sep-rename" style="display:none;"></div>
        <div class="ctx-item danger" id="ctxDelete" role="menuitem" style="display:none;">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6" stroke="currentColor" stroke-width="1.6"
                    stroke-linecap="round" stroke-linejoin="round" />
            </svg>
            삭제
        </div>
    </div>

    <!-- Modal (new note / new folder / rename) -->
    <div class="modal-backdrop" id="modalBackdrop" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal">
            <button class="modal-close" id="modalClose" type="button" aria-label="닫기">
                <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M18 6 6 18M6 6l12 12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
                </svg>
            </button>
            <h3 id="modalTitle">새 노트</h3>
            <div class="modal-field">
                <label for="modalInput" id="modalLabel">이름</label>
                <input id="modalInput" type="text" placeholder="이름을 입력하세요" autocomplete="off" />
            </div>
            <div class="modal-field" id="modalFolderField" style="display:none;">
                <label>폴더 선택</label>
                <div class="mcs" id="modalFolderSelect" role="combobox" tabindex="0">
                    <div class="mcs-trigger">
                        <span class="mcs-display">폴더 선택</span>
                        <svg class="mcs-chevron" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                            <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <ul class="mcs-list" role="listbox"></ul>
                </div>
            </div>
            <div class="modal-actions">
                <button class="modal-cancel" id="modalCancel" type="button">취소</button>
                <button class="modal-submit" id="modalSubmit" type="button">확인</button>
            </div>
        </div>
    </div>

    <script src="/js/api/subject.js"></script>
    <script src="/js/api/article.js"></script>
    <script src="/js/api/image.js"></script>
    <script src="/js/view/home.js"></script>
</body>

</html>
